<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sokin — Yuklab olish</title>
  <meta name="description" content="Sokin meditatsiya ilovasini yuklab oling — iPhone (App Store) va Android (Google Play) uchun." />
  <meta name="theme-color" content="#2F3E46" />

  <meta property="og:title" content="Sokin — Yuklab olish" />
  <meta property="og:description" content="Meditatsiya, nafas mashqlari va sokin uyqu uchun ilova." />
  <meta property="og:image" content="icon.png" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #2F3E46;
      --bg2: #26333a;
      --surface: #354F52;
      --primary: #52796F;
      --icon: #84A98C;
      --text: #F2E9DC;
      --text-muted: rgba(242, 233, 220, 0.66);
      --text-subtle: rgba(242, 233, 220, 0.40);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(120% 80% at 50% -10%, rgba(132,169,140,0.18) 0%, rgba(132,169,140,0) 55%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      background-attachment: fixed;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 64px 24px 40px;
    }

    /* Breathing icon */
    .badge {
      position: relative;
      width: 168px;
      height: 168px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
    }
    .badge::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(132,169,140,0.45) 0%, rgba(132,169,140,0) 70%);
      animation: breathe 9s ease-in-out infinite;
    }
    .badge::after {
      content: "";
      position: absolute;
      width: 156px;
      height: 156px;
      border-radius: 50%;
      border: 1.5px solid rgba(132,169,140,0.35);
      animation: breathe 9s ease-in-out infinite;
    }
    .badge img {
      position: relative;
      width: 104px;
      height: 104px;
      border-radius: 26px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      z-index: 1;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(0.86); opacity: 0.45; }
      50%      { transform: scale(1.10); opacity: 0.9; }
    }
    @media (prefers-reduced-motion: reduce) {
      .badge::before, .badge::after { animation: none; transform: scale(1); }
    }

    .wordmark {
      width: 150px;
      height: auto;
      display: block;
      margin: 0 auto 14px;
    }
    .tagline {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 380px;
      line-height: 1.55;
      margin-bottom: 38px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 13px;
      width: 100%;
      max-width: 320px;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      background: rgba(242,233,220,0.06);
      border: 1px solid rgba(242,233,220,0.14);
      border-radius: 16px;
      color: var(--text);
      text-decoration: none;
      text-align: left;
      transition: background .2s ease, border-color .2s ease, transform .2s ease;
      position: relative;
    }
    .btn:hover { background: rgba(132,169,140,0.16); border-color: rgba(132,169,140,0.5); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn .glyph { width: 26px; height: 26px; flex: 0 0 26px; display: flex; align-items: center; justify-content: center; }
    .btn .glyph svg { width: 100%; height: 100%; fill: var(--text); }
    .btn .label { display: flex; flex-direction: column; line-height: 1.2; }
    .btn .label .small { font-size: 11px; letter-spacing: .5px; text-transform: uppercase; color: var(--text-subtle); font-weight: 600; }
    .btn .label .big { font-size: 16px; font-weight: 700; }

    .btn.primary { background: var(--primary); border-color: var(--icon); order: -1; }
    .btn.primary:hover { background: #5e897e; }
    .btn.primary .label .small { color: rgba(242,233,220,0.78); }
    .rec {
      display: none;
      position: absolute; top: -9px; right: 14px;
      background: var(--icon); color: #1f2d28;
      font-size: 10px; font-weight: 800; letter-spacing: .3px;
      padding: 3px 9px; border-radius: 999px;
    }
    .btn.primary .rec { display: inline-block; }

    .hint {
      margin-top: 28px;
      font-size: 12.5px;
      color: var(--text-subtle);
      max-width: 320px;
      line-height: 1.5;
    }

    footer {
      text-align: center;
      padding: 26px 24px 38px;
      font-size: 12.5px;
      color: var(--text-subtle);
    }
    footer a { color: var(--text-muted); text-decoration: none; font-weight: 600; margin: 0 10px; }
    footer a:hover { color: var(--text); }
    footer .copy { margin-top: 12px; color: var(--text-subtle); }

    @media (max-width: 420px) {
      .wordmark { width: 132px; }
      .badge { width: 150px; height: 150px; }
      .badge::after { width: 138px; height: 138px; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="badge">
      <img src="icon.png" alt="Sokin" />
    </div>

    <img class="wordmark" src="logo.png" alt="Sokin" />
    <p class="tagline">
      Meditatsiya, nafas mashqlari va sokin uyqu uchun ilova.<br />
      Ilovani yuklab oling:
    </p>

    <div class="buttons">
      <a id="btn-ios" class="btn" href="https://apps.apple.com/app/id6761256187" rel="noopener">
        <span class="rec">Tavsiya</span>
        <span class="glyph">
          <svg viewBox="0 0 384 512" aria-hidden="true"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
        </span>
        <span class="label"><span class="small">App Store</span><span class="big">iPhone</span></span>
      </a>

      <a id="btn-android" class="btn" href="https://play.google.com/store/apps/details?id=com.sokin.meditation" rel="noopener">
        <span class="rec">Tavsiya</span>
        <span class="glyph">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.6 1.3c-.3.3-.5.7-.5 1.2v18.9c0 .5.2.9.5 1.2l10.1-10.6L3.6 1.3zm12 8.4l3.9-2.2c.9-.5.9-1.5 0-2L15.9 3.5l-4 4.2 3.7 2zm0 4.6l-3.7 2 4 4.2 3.6-2.1c.9-.5.9-1.5 0-2l-3.9-2.1z"/></svg>
        </span>
        <span class="label"><span class="small">Google Play</span><span class="big">Android</span></span>
      </a>
    </div>

    <p class="hint">
      Tugma ochilmasa — havolani Chrome yoki Safari'da oching.
    </p>
  </div>

  <footer>
    <div>
      <a href="../privacy/">Privacy</a>
      <a href="../terms/">Terms</a>
      <a href="mailto:sokin.support@gmail.com">Kontakt</a>
    </div>
    <div class="copy">© 2026 Sokin</div>
  </footer>

  <script>
    (function () {
      var ua = navigator.userAgent || navigator.vendor || window.opera || "";
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var isAndroid = /android/i.test(ua);
      if (isAndroid) document.getElementById("btn-android").classList.add("primary");
      else if (isIOS) document.getElementById("btn-ios").classList.add("primary");
      else document.getElementById("btn-android").classList.add("primary");
    })();
  </script>

</body>
</html>
