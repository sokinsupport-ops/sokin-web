<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sokin — Yuklab olish</title>
  <meta name="description" content="Sokin meditatsiya ilovasini yuklab oling — iPhone (App Store) va Android (Google Play) uchun." />
  <meta name="theme-color" content="#2F3E46" />

  <meta property="og:title" content="Sokin — Yuklab olish" />
  <meta property="og:description" content="Meditatsiya, nafas mashqlari va sokin uyqu uchun ilova." />
  <meta property="og:image" content="icon.png" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #2F3E46;
      --bg2: #26333a;
      --surface: #354F52;
      --primary: #52796F;
      --icon: #84A98C;
      --text: #F2E9DC;
      --text-muted: rgba(242, 233, 220, 0.66);
      --text-subtle: rgba(242, 233, 220, 0.40);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(120% 80% at 50% -10%, rgba(132,169,140,0.18) 0%, rgba(132,169,140,0) 55%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      background-attachment: fixed;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 64px 24px 40px;
    }

    .logo {
      width: 116px;
      height: 116px;
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      margin-bottom: 30px;
    }

    .tagline {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 350px;
      line-height: 1.6;
      margin-bottom: 0;
    }
    .cta-line {
      font-size: 16px;
      font-weight: 700;
      color: var(--icon);
      margin: 26px 0 30px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 13px;
      width: 100%;
      max-width: 320px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px 20px;
      background: rgba(242,233,220,0.06);
      border: 1px solid rgba(242,233,220,0.14);
      border-radius: 16px;
      color: var(--text);
      text-decoration: none;
      transition: background .2s ease, border-color .2s ease, transform .2s ease;
      position: relative;
    }
    .btn:hover { background: rgba(132,169,140,0.16); border-color: rgba(132,169,140,0.5); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn .label { display: flex; flex-direction: column; line-height: 1.25; align-items: center; gap: 5px; }
    .btn { padding-top: 14px; padding-bottom: 14px; }
    .btn .label .small { font-size: 11px; letter-spacing: .5px; text-transform: uppercase; color: var(--text-subtle); font-weight: 600; }
    .btn .label .big { font-size: 16px; font-weight: 700; }

    .btn.primary { background: var(--primary); border-color: var(--icon); order: -1; }
    .btn.primary:hover { background: #5e897e; }
    .btn.primary .label .small { color: rgba(242,233,220,0.78); }
    .rec {
      display: none;
      position: absolute; top: -9px; right: 14px;
      background: var(--icon); color: #1f2d28;
      font-size: 10px; font-weight: 800; letter-spacing: .3px;
      padding: 3px 9px; border-radius: 999px;
    }
    .btn.primary .rec { display: inline-block; }

    footer {
      text-align: center;
      padding: 26px 24px 38px;
      font-size: 12.5px;
      color: var(--text-subtle);
    }
    footer a { color: var(--text-muted); text-decoration: none; font-weight: 600; margin: 0 10px; }
    footer a:hover { color: var(--text); }
    footer .copy { margin-top: 12px; color: var(--text-subtle); }

    @media (max-width: 420px) {
      .logo { width: 104px; height: 104px; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <img class="logo" src="icon.png" alt="Sokin" />

    <p class="tagline">
      Sokin — bu stress, xavotir yoki ichki bezovtalik paytida istalgan vaqtda murojaat qilib, hissiy holatingizni yengillashtirish mumkin bo‘lgan ilova.
    </p>
    <p class="cta-line">Ilovani yuklab oling:</p>

    <div class="buttons">
      <a id="btn-ios" class="btn" href="https://apps.apple.com/app/id6761256187" rel="noopener">
        <span class="rec">Tavsiya</span>
        <span class="label"><span class="small">App Store</span><span class="big">iPhone</span></span>
      </a>

      <a id="btn-android" class="btn" href="https://play.google.com/store/apps/details?id=com.sokin.meditation" rel="noopener">
        <span class="rec">Tavsiya</span>
        <span class="label"><span class="small">Google Play</span><span class="big">Android</span></span>
      </a>
    </div>
  </div>

  <footer>
    <div>
      <a href="../privacy/">Privacy</a>
      <a href="../terms/">Terms</a>
      <a href="mailto:sokin.support@gmail.com">sokin.support@gmail.com</a>
    </div>
    <div class="copy">© 2026 Sokin</div>
  </footer>

  <script>
    (function () {
      var ua = navigator.userAgent || navigator.vendor || window.opera || "";
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var isAndroid = /android/i.test(ua);
      if (isAndroid) document.getElementById("btn-android").classList.add("primary");
      else if (isIOS) document.getElementById("btn-ios").classList.add("primary");
      else document.getElementById("btn-android").classList.add("primary");
    })();
  </script>

</body>
</html>
